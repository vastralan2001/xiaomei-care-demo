<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>小美 · 人性化关怀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#06C160;--primary-light:#e8f8ef;
  --bg:#fff;
  --user-bubble:#ffe066;--user-text:#333;
  --bot-bubble:#f0f2f5;--bot-text:#1a1a2e;
  --coupon-a:#ff6b6b;--coupon-b:#ee5a24;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#fff;color:#1a1a2e;overflow:hidden;touch-action:manipulation}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* Nav bar */
.nav{
  background:#fff;
  padding:calc(var(--safe-top) + 8px) 16px 0;
  flex-shrink:0;z-index:10;
  border-bottom:1px solid #f0f0f0;
}
.nav-top{display:flex;align-items:center;gap:10px;padding-bottom:10px}
.nav-top .av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#06C160,#00d4aa);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700;flex-shrink:0}
.nav-top .nm{font-size:16px;font-weight:700;color:#1a1a2e}
.nav-top .tg{font-size:11px;background:var(--primary-light);color:var(--primary);padding:2px 10px;border-radius:10px;margin-left:auto;font-weight:600}

/* Scene tabs */
.tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:8px 16px;font-size:13px;font-weight:600;color:#999;
  position:relative;cursor:pointer;transition:all .2s;white-space:nowrap;
  border:none;background:none;
}
.tab.on{color:var(--primary)}
.tab.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2.5px;background:var(--primary);border-radius:2px}
.tab .tab-ic{margin-right:4px}

/* AB toggle */
.ab-bar{
  display:flex;align-items:center;gap:0;flex-shrink:0;
  background:#f8f9fa;border-bottom:1px solid #eee;
}
.ab-btn{
  flex:1;padding:9px 0;text-align:center;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;color:#999;position:relative;
  border:none;background:none;
}
.ab-btn.ctrl.on{color:#666;background:#fff}
.ab-btn.ctrl.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#999;border-radius:1px}
.ab-btn.treat.on{color:var(--primary);background:#fff}
.ab-btn.treat.on::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--primary);border-radius:1px}
.ab-btn .ab-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.ab-btn.ctrl .ab-dot{background:#bbb}
.ab-btn.treat .ab-dot{background:var(--primary)}

/* State banner */
.st-ban{background:linear-gradient(135deg,#fff9e6,#fff3cc);padding:8px 16px;font-size:12px;color:#b8860b;display:flex;align-items:center;gap:6px;flex-shrink:0;border-bottom:1px solid #f5e6b8}
.st-ban .dt{width:5px;height:5px;border-radius:50%;background:#f0a500;flex-shrink:0}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:14px 14px calc(var(--safe-bot) + 70px);display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}

.msg{display:flex;gap:8px;max-width:88%;animation:mIn .35s ease}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.bbl{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word}
.msg.u .bbl{background:var(--user-bubble);color:var(--user-text);border-bottom-right-radius:4px}
.msg.b .bbl{background:var(--bot-bubble);color:var(--bot-text);border-bottom-left-radius:4px}
.bbl strong{color:#06C160;font-weight:600}
.b-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#06C160,#00d4aa);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0;margin-top:2px}

/* Typing */
.typ{display:flex;gap:4px;padding:8px 14px;align-self:flex-start;margin-left:36px}
.typ span{width:7px;height:7px;border-radius:50%;background:#ccc;animation:tDot 1.2s infinite}
.typ span:nth-child(2){animation-delay:.2s}
.typ span:nth-child(3){animation-delay:.4s}

/* Divider label */
.div-label{align-self:center;font-size:11px;color:#bbb;background:#f8f8f8;padding:4px 14px;border-radius:12px;margin:6px 0}

/* Mini POI cards */
.poi-row{margin-left:36px;display:flex;flex-direction:column;gap:7px;max-width:calc(100% - 50px);animation:mIn .35s ease}
.poi-mini{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #eee;border-radius:12px;padding:11px 12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.poi-mini .pm-rank{width:24px;height:24px;border-radius:7px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#999;flex-shrink:0}
.poi-mini .pm-rank.r1{background:#fff7e6;color:#f0a500}
.poi-mini .pm-body{flex:1;min-width:0}
.poi-mini .pm-name{font-size:13.5px;font-weight:600;color:#1a1a2e;margin-bottom:2px;display:flex;align-items:center;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.poi-mini .pm-name .star{font-size:11px;color:#f0a500}
.poi-mini .pm-meta{font-size:11px;color:#999}
.poi-mini .pm-price{font-size:13px;font-weight:700;color:var(--coupon-a);flex-shrink:0}

/* Extra POI card — same visual language as normal poi-mini */
.poi-extra-row{margin-left:36px;display:flex;flex-direction:column;gap:0;max-width:calc(100% - 50px);animation:mIn .35s ease}
.poi-extra-card{
  background:#fff;border:1.5px solid rgba(6,193,96,.25);border-radius:12px;
  box-shadow:0 2px 10px rgba(6,193,96,.08);overflow:hidden;
}
.poi-extra-card .pe-main{display:flex;align-items:center;gap:10px;padding:11px 12px}
.poi-extra-card .pe-emo{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.poi-extra-card[data-t="health"] .pe-emo{background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
.poi-extra-card[data-t="warm"] .pe-emo{background:linear-gradient(135deg,#fff0e6,#ffe0cc)}
.poi-extra-card[data-t="night"] .pe-emo{background:linear-gradient(135deg,#e8eaf6,#d1d5f0)}
.poi-extra-card[data-t="comfort"] .pe-emo{background:linear-gradient(135deg,#fef3e2,#fde6c8)}
.poi-extra-card .pe-body{flex:1;min-width:0}
.poi-extra-card .pe-nm{font-size:14px;font-weight:700;color:#1a1a2e;display:flex;align-items:center;gap:4px}
.poi-extra-card .pe-nm .star{font-size:11px;color:#f0a500;font-weight:400}
.poi-extra-card .pe-meta{font-size:11px;color:#999;margin-top:2px}
.poi-extra-card .pe-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.poi-extra-card .pe-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600}
.poi-extra-card .pe-badge.green{background:rgba(6,193,96,.1);color:var(--primary);border:1px solid rgba(6,193,96,.15)}
.poi-extra-card .pe-badge.red{background:rgba(255,87,34,.1);color:#ff5722;border:1px solid rgba(255,87,34,.15)}
.poi-extra-card .pe-dishes{padding:0 12px 10px;display:flex;flex-direction:column;gap:4px;border-top:1px solid #f5f5f5;margin-top:0;padding-top:8px}
.poi-extra-card .pe-di{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:#fafbfc;border-radius:6px}
.poi-extra-card .pe-di-name{font-size:12px;color:#333;font-weight:500}
.poi-extra-card .pe-di-price{font-size:12px;color:#ff5722;font-weight:700}

/* Coupon */
.cpn-wrap{margin-left:36px;max-width:calc(100% - 50px);animation:mIn .35s ease}
.cpn{border-radius:14px;overflow:hidden;position:relative;background:#fff;border:1px solid #ffe0d0;box-shadow:0 3px 16px rgba(255,87,34,.1)}
.cpn-top{background:linear-gradient(135deg,#ff6f3c,#ff4517);padding:16px 16px 14px;color:#fff;position:relative;overflow:hidden}
.cpn-top::before{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06)}
.cpn-top::after{content:'';position:absolute;right:20px;bottom:-10px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.04)}
.cpn-label{font-size:11px;font-weight:600;background:rgba(255,255,255,.2);display:inline-block;padding:2px 10px;border-radius:5px;margin-bottom:8px}
.cpn-price{display:flex;align-items:flex-end;gap:2px;margin-bottom:6px}
.cpn-price .sym{font-size:18px;font-weight:700;line-height:1;margin-bottom:3px}
.cpn-price .val{font-size:44px;font-weight:800;line-height:1;letter-spacing:-2px}
.cpn-price .unit{font-size:13px;opacity:.85;margin-left:8px;margin-bottom:4px}
.cpn-desc{font-size:13px;font-weight:500;line-height:1.5;opacity:.95}
.cpn-store{font-size:11px;opacity:.7;margin-top:4px}
.cpn-cut{display:flex;align-items:center;height:20px;margin:0}
.cpn-cut::before,.cpn-cut::after{content:'';width:10px;height:20px;flex-shrink:0;background:#fff}
.cpn-cut::before{border-radius:0 10px 10px 0;margin-left:-1px}
.cpn-cut::after{border-radius:10px 0 0 10px;margin-right:-1px}
.cpn-cut-line{flex:1;border-top:2px dashed #ffe0d0}
.cpn-bot{padding:12px 16px;display:flex;align-items:center;gap:10px}
.cpn-rules{flex:1;min-width:0}
.cpn-rules .cpn-r{font-size:11px;color:#999;line-height:1.7;display:flex;align-items:baseline;gap:4px}
.cpn-rules .cpn-r::before{content:'·';color:#ccc;font-weight:700;flex-shrink:0}
.cpn-btn{
  padding:10px 24px;
  background:linear-gradient(135deg,#ff6f3c,#ff4517);
  color:#fff;border:none;border-radius:24px;
  font-size:14px;font-weight:700;cursor:pointer;
  flex-shrink:0;white-space:nowrap;
  box-shadow:0 3px 10px rgba(255,69,23,.3);
  -webkit-appearance:none;
}
.cpn-btn:active{transform:scale(.96);opacity:.9}
.cpn-btn.ok{background:#e8e8e8;color:#aaa;box-shadow:none;pointer-events:none}

/* Bottom query bar (fixed) */
.qbar{
  position:fixed;bottom:0;left:0;right:0;
  padding:8px 12px calc(var(--safe-bot) + 8px);
  background:#fff;border-top:1px solid #f0f0f0;
  display:flex;gap:6px;flex-wrap:wrap;
  z-index:10;
}
.qc{
  padding:7px 14px;background:#f5f5f5;border:1px solid #e8e8e8;border-radius:20px;
  font-size:13px;color:#555;cursor:pointer;transition:all .15s;white-space:nowrap;
  -webkit-appearance:none;
}
.qc:active{transform:scale(.95)}
.qc.on{background:var(--primary);color:#fff;border-color:var(--primary)}

@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>
<div class="app">
  <div class="nav">

  },
  {
    id:'weather',icon:'🌧️',name:'天气关怀',
    stateShort:'当日降温>8°C / 下雨天',
    userState:'当日气温骤降10°C，外面正在下雨',
    query:'帮我点个外卖',
    altQ:['帮我点个外卖','点个外卖吧','好冷想吃点热的'],
    botNormal:'好的，帮你找了几家附近评价不错的~',
    normalPois:[
      {rank:1,name:'杨国福麻辣烫',stars:'4.5',meta:'月售6000+ · 20min',price:'¥15起'},
      {rank:2,name:'老王炒饭',stars:'4.3',meta:'月售4500+ · 18min',price:'¥12起'},
      {rank:3,name:'味千拉面',stars:'4.6',meta:'月售2800+ · 25min',price:'¥28起'}
    ],
    botCare:'今天降温了不少，出门记得加衣服哦！这种天气来碗热汤最舒服了，附近有一家<strong>老张砂锅粥</strong>，招牌砂锅粥和菌菇鸡汤都很暖胃，下雨天窝着喝一碗超幸福~',
    extraPoi:{theme:'warm',emoji:'🍜',name:'老张砂锅粥',rating:'4.7',badge:'暖胃推荐',meta:'月售1500+ | 配送30min | 起送¥18',dishes:[{n:'招牌砂锅粥',p:'26'},{n:'菌菇鸡汤',p:'32'},{n:'排骨煲',p:'35'}]},

  },
  {

    altQ:['饿了，帮我点个宵夜','加班好饿','有什么宵夜推荐'],

    normalPois:[
      {rank:1,name:'麦当劳(24h)',stars:'4.4',meta:'月售8000+ · 15min',price:'¥20起'},
      {rank:2,name:'烧烤大排档',stars:'4.3',meta:'月售3200+ · 22min',price:'¥25起'},
      {rank:3,name:'螺蛳粉王',stars:'4.5',meta:'月售2600+ · 20min',price:'¥16起'}
    ],
    botCare:'深夜吃太油腻容易胃不舒服，给你找了一家又好吃又不太负担的——<strong>粥小仙</strong>的红枣小米粥和蒸饺组合超适合当宵夜，暖胃又管饱~',
    extraPoi:{theme:'night',emoji:'🌟',name:'粥小仙',rating:'4.8',badge:'深夜营业',meta:'月售2500+ | 配送20min | 营业至凌晨2点',dishes:[{n:'红枣小米粥',p:'14'},{n:'蒸饺(8只)',p:'18'},{n:'银耳莲子羹',p:'12'}]},
    coupon:{name:'深夜犒劳红包',amt:4,cond:'满18元可用',store:'粥小仙',desc:'加班辛苦了，小美请你4块钱宵夜，全品类商家可用',scope:'全品类商家可用 · 仅限22:00-02:00',exp:'仅限今日使用'}
  },
  {
    id:'mood',icon:'💆',name:'情绪关怀',
    stateShort:'对话语气低落',
    userState:'用户对话语气低落（"随便吧""算了"），疑似情绪不佳',
    query:'随便吃点什么吧',
    altQ:['随便吃点什么吧','算了不知道吃啥','无所谓 随便'],
    botNormal:'那我帮你挑几家不用纠结的~',
    normalPois:[
      {rank:1,name:'真功夫',stars:'4.4',meta:'月售5500+ · 18min',price:'¥18起'},
      {rank:2,name:'吉野家',stars:'4.3',meta:'月售4200+ · 20min',price:'¥22起'},
      {rank:3,name:'沙县小吃',stars:'4.2',meta:'月售7000+ · 15min',price:'¥10起'}
    ],
    botCare:'感觉你今天可能有点累，那就不纠结啦！附近有一家<strong>一口暖心粥铺</strong>，他家的皮蛋瘦肉粥和桂花糯米藕特别治愈，热乎乎的喝完心情都会好一点~',
    extraPoi:{theme:'comfort',emoji:'🍲',name:'一口暖心粥铺',rating:'4.9',badge:'治愈美食',meta:'月售3000+ | 配送20min | 起送¥12',dishes:[{n:'皮蛋瘦肉粥',p:'15'},{n:'桂花糯米藕',p:'18'},{n:'红豆汤圆',p:'12'}]},
    coupon:{name:'治愈美食红包',amt:3,cond:'满15元可用',store:'一口暖心粥铺',desc:'想吃啥就吃啥，小美请你3块钱，全品类商家通用',scope:'全品类商家可用',exp:'领取后3天内有效'}
  }
];

let cur=0,timers=[],abGroup='treat';
function clr(){timers.forEach(t=>clearTimeout(t));timers=[]}
function tm(fn,ms){const id=setTimeout(fn,ms);timers.push(id);return id}

function setAB(g){
  abGroup=g;
  document.querySelectorAll('.ab-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector('.ab-btn.'+g).classList.add('on');
  doChat(S[cur]);
}

function initTabs(){
  document.getElementById('tabs').innerHTML=S.map((s,i)=>
    `<button class="tab ${i===0?'on':''}" onclick="sw(${i})"><span class="tab-ic">${s.icon}</span>${s.name}</button>`
  ).join('');
}

function sw(i){
  if(i===cur)return;cur=i;
  document.querySelectorAll('.tab').forEach((e,j)=>e.classList.toggle('on',j===i));
  render(S[i]);
}

function render(s){
  document.getElementById('sTxt').textContent=s.userState;
  const qb=document.getElementById('qBar');
  qb.innerHTML=s.altQ.map((q,i)=>`<div class="qc ${i===0?'on':''}" onclick="selQ(this,'${q.replace(/'/g,"\\'")}')">${q}</div>`).join('');
  doChat(s);
}

function selQ(el,q){
  document.querySelectorAll('.qc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  doChat(S[cur],q);
}

function doChat(s,cq){
  clr();
  const c=document.getElementById('chat');
  c.innerHTML='';
  const isTreat=abGroup==='treat';
  addB(c,'你好呀！想吃什么，我帮你找~');
  tm(()=>{
    addU(c,cq||s.query);
    tm(()=>{
      addTyp(c);
      tm(()=>{
        rmTyp(c);
        addB(c,s.botNormal);
        tm(()=>{
          addNormalPois(c,s.normalPois);
          if(isTreat){
            tm(()=>{
              addDiv(c,'─── 小美关怀 ───');
              c.scrollTo({top:c.scrollHeight,behavior:'smooth'});
              tm(()=>{
                addB(c,s.botCare);
                c.scrollTo({top:c.scrollHeight,behavior:'smooth'});
                tm(()=>{
                  addExtraPoi(c,s.extraPoi,s.coupon);
                  c.scrollTo({top:c.scrollHeight,behavior:'smooth'});
                  tm(()=>{
                    addCpn(c,s.coupon);
                    tm(()=>c.scrollTo({top:c.scrollHeight,behavior:'smooth'}),150);
                  },500);
                },500);
              },400);
            },500);
          } else {
            tm(()=>{
              addB(c,'想吃哪个我帮你看看详情？');
              tm(()=>c.scrollTo({top:c.scrollHeight,behavior:'smooth'}),200);
            },350);
          }
        },450);
      },1000);
    },400);
  },400);
}

function addU(c,txt){const d=document.createElement('div');d.className='msg u';d.innerHTML=`<div class="bbl">${txt}</div>`;c.appendChild(d);c.scrollTo({top:c.scrollHeight,behavior:'smooth'})}
function addB(c,h){const d=document.createElement('div');d.className='msg b';d.innerHTML=`<div class="b-av">美</div><div class="bbl">${h}</div>`;c.appendChild(d);c.scrollTo({top:c.scrollHeight,behavior:'smooth'})}
function addTyp(c){const d=document.createElement('div');d.className='typ';d.id='tp';d.innerHTML='<span></span><span></span><span></span>';c.appendChild(d);c.scrollTo({top:c.scrollHeight,behavior:'smooth'})}
function rmTyp(c){const e=document.getElementById('tp');if(e)e.remove()}
function addDiv(c,txt){const d=document.createElement('div');d.className='div-label';d.textContent=txt;c.appendChild(d);c.scrollTo({top:c.scrollHeight,behavior:'smooth'})}

function addNormalPois(c,pois){
  const w=document.createElement('div');w.className='poi-row';
  w.innerHTML=pois.map(p=>`
    <div class="poi-mini">
      <div class="pm-rank ${p.rank===1?'r1':''}">${p.rank}</div>
      <div class="pm-body">
        <div class="pm-name">${p.name} <span class="star">★ ${p.stars}</span></div>
        <div class="pm-meta">${p.meta}</div>
      </div>
      <div class="pm-price">${p.price}</div>
    </div>`).join('');
  c.appendChild(w);
  c.scrollTo({top:c.scrollHeight,behavior:'smooth'});
}

function addExtraPoi(c,p,cpn){
  const d=document.createElement('div');d.className='poi-extra-row';
  d.innerHTML=`<div class="poi-extra-card" data-t="${p.theme}">
    <div class="pe-main">
      <div class="pe-emo">${p.emoji}</div>
      <div class="pe-body">
        <div class="pe-nm">${p.name} <span class="star">★ ${p.rating}</span></div>
        <div class="pe-meta">${p.meta}</div>
        <div class="pe-badges">
          <span class="pe-badge green">✦ ${p.badge}</span>
          <span class="pe-badge red">🧧 红包¥${cpn.amt}</span>
        </div>
      </div>
    </div>
    <div class="pe-dishes">
      ${p.dishes.map(x=>`<div class="pe-di"><span class="pe-di-name">${x.n}</span><span class="pe-di-price">¥${x.p}</span></div>`).join('')}
    </div>
  </div>`;
  c.appendChild(d);
  c.scrollTo({top:c.scrollHeight,behavior:'smooth'});
}

function addCpn(c,cp){
  const d=document.createElement('div');d.className='cpn-wrap';
  d.innerHTML=`<div class="cpn">
    <div class="cpn-top">
      <div class="cpn-label">🧧 小美外卖红包</div>
      <div class="cpn-price">
        <span class="sym">¥</span><span class="val">${cp.amt}</span>
        <span class="unit">${cp.cond}</span>
      </div>
      <div class="cpn-desc">${cp.desc}</div>
      <div class="cpn-store">推荐门店：${cp.store}</div>
    </div>
    <div class="cpn-cut"><div class="cpn-cut-line"></div></div>
    <div class="cpn-bot">
      <div class="cpn-rules">
        <div class="cpn-r">${cp.scope}</div>
        <div class="cpn-r">${cp.exp}</div>
      </div>
      <button class="cpn-btn" onclick="this.textContent='✓ 已领取';this.classList.add('ok')">立即领取</button>
    </div>
  </div>`;
  c.appendChild(d);
  c.scrollTo({top:c.scrollHeight,behavior:'smooth'});
}

initTabs();
render(S[0]);
</script>
</body>
</html>
